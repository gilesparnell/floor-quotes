name: Lint · Test · Build

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify site contract
        run: npm run verify

      - name: Run tests
        run: npm test

      - name: Build production site
        run: npm run build
